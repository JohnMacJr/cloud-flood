<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Daily Flood — A daily color-flood puzzle game. Capture the entire 9×9 board in as few moves as possible!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <title>Daily Flood</title>
</head>

<body>
  <div id="root"></div>
  <script>
    window.addEventListener('error', (event) => {
      document.body.innerHTML = '<div style="color:red;z-index:9999;position:fixed;top:0;left:0;background:white;padding:20px;"><pre>' + event.error.stack + '</pre></div>';
    });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
