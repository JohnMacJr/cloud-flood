name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            services/api/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend
        run: npm run test

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://daily-flood-api-84376519894.us-central1.run.app

      - name: Install backend dependencies
        working-directory: ./services/api
        run: npm ci

      - name: Test backend
        working-directory: ./services/api
        run: npm run test

      - name: Build backend
        working-directory: ./services/api
        run: npm run build
